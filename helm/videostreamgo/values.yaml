# Default values for videostreamgo.
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.

global:
  imageRegistry: videostreamgo
  imagePullSecrets:
    - name: docker-registry-secret

# Application Configuration
appName: videostreamgo
environment: production

# Platform API Configuration
platform-api:
  enabled: true
  replicaCount: 3
  image:
    repository: platform-api
    tag: latest
    pullPolicy: Always
  service:
    type: ClusterIP
    port: 8080
  resources:
    requests:
      cpu: 250m
      memory: 256Mi
    limits:
      cpu: 1000m
      memory: 512Mi
  livenessProbe:
    httpGet:
      path: /health
      port: 8080
    initialDelaySeconds: 30
    periodSeconds: 10
  readinessProbe:
    httpGet:
      path: /ready
      port: 8080
    initialDelaySeconds: 5
    periodSeconds: 5
  autoscaling:
    enabled: true
    minReplicas: 3
    maxReplicas: 10
    targetCPUUtilizationPercentage: 70
    targetMemoryUtilizationPercentage: 80
  config:
    DB_HOST: "postgresql-ha-pgpool.videostreamgo.svc.cluster.local"
    DB_PORT: "5432"
    REDIS_HOST: "redis-headless.videostreamgo.svc.cluster.local"
    REDIS_PORT: "6379"
    APP_ENV: "production"
    APP_PORT: "8080"
    S3_ENDPOINT: ""
    S3_REGION: "us-east-1"
    S3_BUCKET: "videostreamgo"
    S3_USE_SSL: "true"
  secrets:
    DB_USER: "postgres"
    DB_PASSWORD: ""
    JWT_SECRET: ""
    STRIPE_SECRET_KEY: ""
    STRIPE_PUBLISHABLE_KEY: ""
    STRIPE_WEBHOOK_SECRET: ""
    AWS_ACCESS_KEY_ID: ""
    AWS_SECRET_ACCESS_KEY: ""

# Instance API Configuration
instance-api:
  enabled: true
  replicaCount: 3
  image:
    repository: instance-api
    tag: latest
    pullPolicy: Always
  service:
    type: ClusterIP
    port: 8081
  resources:
    requests:
      cpu: 250m
      memory: 256Mi
    limits:
      cpu: 1000m
      memory: 512Mi
  livenessProbe:
    httpGet:
      path: /health
      port: 8081
    initialDelaySeconds: 30
    periodSeconds: 10
  readinessProbe:
    httpGet:
      path: /ready
      port: 8081
    initialDelaySeconds: 5
    periodSeconds: 5
  autoscaling:
    enabled: true
    minReplicas: 3
    maxReplicas: 10
    targetCPUUtilizationPercentage: 70
    targetMemoryUtilizationPercentage: 80
  config:
    DB_HOST: "postgresql-ha-pgpool.videostreamgo.svc.cluster.local"
    DB_PORT: "5432"
    REDIS_HOST: "redis-headless.videostreamgo.svc.cluster.local"
    REDIS_PORT: "6379"
    APP_ENV: "production"
    APP_PORT: "8081"
    S3_ENDPOINT: ""
    S3_REGION: "us-east-1"
    S3_BUCKET: "videostreamgo"
    S3_USE_SSL: "true"
  secrets:
    DB_USER: "postgres"
    DB_PASSWORD: ""
    JWT_SECRET: ""
    INSTANCE_JWT_SECRET: ""

# Frontend Configuration
frontend:
  enabled: true
  replicaCount: 2
  image:
    repository: frontend
    tag: latest
    pullPolicy: Always
  service:
    type: ClusterIP
    port: 3000
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 256Mi
  config:
    API_URL: "https://api.videostreamgo.com/v1"
    PUBLIC_INSTANCE_ID: "platform"
  autoscaling:
    enabled: true
    minReplicas: 2
    maxReplicas: 5
    targetCPUUtilizationPercentage: 70

# Ingress Configuration
ingress:
  enabled: true
  className: nginx
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: "500M"
    nginx.ingress.kubernetes.io/proxy-connect-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
    nginx.ingress.kubernetes.io/affinity: "cookie"
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
  hosts:
    - host: api.videostreamgo.com
      paths:
        - path: /
          pathType: Prefix
    - host: "*.videostreamgo.com"
      paths:
        - path: /
          pathType: Prefix
  tls:
    - secretName: platform-tls
      hosts:
        - api.videostreamgo.com
        - "*.videostreamgo.com"

# PostgreSQL HA Configuration (using Bitnami chart)
postgresql:
  enabled: true
  postgresql:
    replicaCount: 1
    resources:
      requests:
        cpu: 500m
        memory: 512Mi
      limits:
        cpu: 2000m
        memory: 2Gi
    pgpool:
      replicaCount: 1
      resources:
        requests:
          cpu: 250m
          memory: 256Mi
        limits:
          cpu: 500m
          memory: 512Mi
  persistence:
    size: 20Gi
  metrics:
    enabled: true
  volumePermissions:
    enabled: true
  metrics:
    image:
      repository: bitnami/postgres-exporter
      tag: latest

# Redis Configuration (using Bitnami chart)
redis:
  enabled: true
  architecture: standalone
  master:
    replicaCount: 1
    resources:
      requests:
        cpu: 100m
        memory: 128Mi
      limits:
        cpu: 500m
        memory: 256Mi
    persistence:
      size: 1Gi
  metrics:
    enabled: true
    image:
      repository: bitnami/redis-exporter
      tag: latest

# Ingress-Nginx Configuration
ingress-nginx:
  enabled: true
  controller:
    replicaCount: 2
    resources:
      requests:
        cpu: 100m
        memory: 90Mi
      limits:
        cpu: 500m
        memory: 256Mi
    service:
      type: LoadBalancer
      annotations:
        service.beta.kubernetes.io/aws-load-balancer-type: nlb
        service.beta.kubernetes.io/aws-load-balancer-cross-zone-load-balancing-enabled: "true"
    metrics:
      enabled: true
    publishService:
      enabled: true
    config:
      proxy-body-size: "500M"
      proxy-connect-timeout: "3600"
      proxy-send-timeout: "3600"
      proxy-read-timeout: "3600"

# Cert-Manager Configuration
cert-manager:
  enabled: true
  installCRDs: true
  webhook:
    replicaCount: 1
  cainjector:
    replicaCount: 1
  prometheus:
    enabled: true
  extraArgs:
    - --dns01-recursive-nameservers=8.8.8.8:53,1.1.1.1:53

# Prometheus Operator Configuration
prometheus-operator:
  enabled: true
  prometheus:
    prometheusSpec:
      retention: 15d
      storageSpec:
        volumeClaimTemplate:
          spec:
            resources:
              requests:
                storage: 10Gi
      resources:
        requests:
          cpu: 200m
          memory: 256Mi
        limits:
          cpu: 1000m
          memory: 1Gi
  alertmanager:
    alertmanagerSpec:
      resources:
        requests:
          cpu: 100m
          memory: 128Mi
        limits:
          cpu: 500m
          memory: 256Mi
  grafana:
    enabled: false  # Using separate grafana chart

# Grafana Configuration
grafana:
  enabled: true
  adminPassword: ""
  persistence:
    enabled: true
    size: 1Gi
  datasources:
    datasources.yaml:
      apiVersion: 1
      datasources:
        - name: Prometheus
          type: prometheus
          url: http://prometheus-operated:9090
          access: proxy
          isDefault: true
  dashboards:
    default:
      api-overview:
        gnetId: 2
        revision: 1
        datasource: Prometheus
      api-performance:
        gnetId: 3
        revision: 1
        datasource: Prometheus

# Service Account Configuration
serviceAccount:
  create: true
  annotations: {}

# RBAC Configuration
rbac:
  create: true

# Pod Security Context
podSecurityContext:
  runAsNonRoot: true
  runAsUser: 1000
  runAsGroup: 1000
  fsGroup: 1000

# Container Security Context
containerSecurityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  capabilities:
    drop:
      - ALL

# Node Selector
nodeSelector: {}

# Tolerations
tolerations: []

# Affinity
affinity: {}

# Topology Spread Constraints
topologySpreadConstraints: []
