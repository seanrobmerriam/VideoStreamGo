{{- if .Values.instance-api.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "videostreamgo.fullname" . }}-instance-api
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "videostreamgo.labels" . | nindent 4 }}
    app.kubernetes.io/component: instance-api
spec:
  replicas: {{ .Values.instance-api.replicaCount }}
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      {{- include "videostreamgo.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: instance-api
  template:
    metadata:
      labels:
        {{- include "videostreamgo.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: instance-api
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8081"
        prometheus.io/path: "/metrics"
    spec:
      serviceAccountName: {{ include "videostreamgo.serviceAccountName" . }}
      securityContext:
        runAsUser: 1001
        runAsGroup: 1001
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      {{- with .Values.global.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: instance-api
          image: {{ include "videostreamgo.image" (dict . "component" "instance-api") }}
          imagePullPolicy: {{ .Values.instance-api.image.pullPolicy }}
          ports:
            - containerPort: 8081
              name: http
              protocol: TCP
          env:
            - name: GOMAXPROCS
              value: "4"
            - name: GOMEMLIMIT
              value: "512MiB"
            {{- range $key, $value := .Values.instance-api.config }}
            - name: {{ $key | upper }}
              value: {{ $value | quote }}
            {{- end }}
            {{- range $key, $value := .Values.instance-api.secrets }}
            - name: {{ $key | upper }}
              valueFrom:
                secretKeyRef:
                  name: {{ include "videostreamgo.fullname" . }}-secrets
                  key: {{ $key }}
            {{- end }}
          resources:
            {{- toYaml .Values.instance-api.resources | nindent 12 }}
          livenessProbe:
            httpGet:
              path: /health
              port: 8081
            {{- toYaml .Values.instance-api.livenessProbe | nindent 12 }}
          readinessProbe:
            httpGet:
              path: /ready
              port: 8081
            {{- toYaml .Values.instance-api.readinessProbe | nindent 12 }}
          startupProbe:
            httpGet:
              path: /health
              port: 8081
            initialDelaySeconds: 0
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 30
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir: {}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.topologySpreadConstraints }}
      topologySpreadConstraints:
        {{- toYaml . | nindent 8 }}
      {{- end }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "videostreamgo.fullname" . }}-instance-api
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "videostreamgo.labels" . | nindent 4 }}
    app.kubernetes.io/component: instance-api
spec:
  type: {{ .Values.instance-api.service.type }}
  ports:
    - port: {{ .Values.instance-api.service.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "videostreamgo.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: instance-api
---
{{- if .Values.instance-api.autoscaling.enabled }}
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: {{ include "videostreamgo.fullname" . }}-instance-api
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "videostreamgo.labels" . | nindent 4 }}
    app.kubernetes.io/component: instance-api
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: {{ include "videostreamgo.fullname" . }}-instance-api
  minReplicas: {{ .Values.instance-api.autoscaling.minReplicas }}
  maxReplicas: {{ .Values.instance-api.autoscaling.maxReplicas }}
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: {{ .Values.instance-api.autoscaling.targetCPUUtilizationPercentage }}
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: {{ .Values.instance-api.autoscaling.targetMemoryUtilizationPercentage }}
{{- end }}
{{- end }}
