apiVersion: v1
kind: ConfigMap
metadata:
  name: platform-config
  namespace: videostreamgo
data:
  # Database Configuration
  DB_HOST: "postgres-master.videostreamgo.svc.cluster.local"
  DB_PORT: "5432"
  DB_NAME: "videostreamgo_master"
  
  # Redis Configuration
  REDIS_HOST: "redis.videostreamgo.svc.cluster.local"
  REDIS_PORT: "6379"
  
  # Application Configuration
  APP_ENV: "production"
  APP_PORT: "8080"
  
  # Storage Configuration
  S3_ENDPOINT: "https://s3.amazonaws.com"
  S3_REGION: "us-east-1"
  S3_BUCKET: "videostreamgo"
  S3_USE_SSL: "true"
  
  # Logging
  LOG_LEVEL: "info"
  LOG_FORMAT: "json"
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: instance-config
  namespace: videostreamgo
data:
  # Database Configuration
  DB_HOST: "postgres-master.videostreamgo.svc.cluster.local"
  DB_PORT: "5432"
  
  # Redis Configuration
  REDIS_HOST: "redis.videostreamgo.svc.cluster.local"
  REDIS_PORT: "6379"
  
  # Application Configuration
  APP_ENV: "production"
  APP_PORT: "8081"
  
  # Storage Configuration
  S3_ENDPOINT: "https://s3.amazonaws.com"
  S3_REGION: "us-east-1"
  S3_BUCKET: "videostreamgo"
  S3_USE_SSL: "true"
  
  # Logging
  LOG_LEVEL: "info"
  LOG_FORMAT: "json"
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: frontend-config
  namespace: videostreamgo
data:
  API_URL: "https://api.videostreamgo.com/v1"
  PUBLIC_INSTANCE_ID: "platform"
