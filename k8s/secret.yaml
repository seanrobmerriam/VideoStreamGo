---
# Secrets for VideoStreamGo platform
apiVersion: v1
kind: Secret
metadata:
  name: videostreamgo-secrets
  namespace: videostreamgo
  labels:
    app.kubernetes.io/name: videostreamgo
type: Opaque
stringData:
  # Note: In production, use sealed secrets or external secrets management
  DATABASE_PASSWORD: "your-secure-postgres-password"
  JWT_SECRET: "your-jwt-secret-key-min-32-chars"
  ENCRYPTION_KEY: "your-32-byte-encryption-key"
  S3_SECRET_KEY: "your-s3-secret-key"
  STRIPE_SECRET_KEY: "sk_test_..."
  STRIPE_WEBHOOK_SECRET: "whsec_..."
---
# MinIO root credentials secret
apiVersion: v1
kind: Secret
metadata:
  name: minio-secrets
  namespace: videostreamgo
  labels:
    app.kubernetes.io/name: videostreamgo
type: Opaque
stringData:
  MINIO_ROOT_USER: "minioadmin"
  MINIO_ROOT_PASSWORD: "minioadmin-secret"
