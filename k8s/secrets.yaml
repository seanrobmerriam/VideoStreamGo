apiVersion: v1
kind: Secret
metadata:
  name: platform-secrets
  namespace: videostreamgo
type: Opaque
stringData:
  # Database credentials (base64 encoded values)
  DB_USER: "cG9zdGdyZXM="  # postgres (base64)
  DB_PASSWORD: "your-secure-password-here"  # Replace with actual password
  
  # Redis password (if configured)
  REDIS_PASSWORD: ""
  
  # JWT secrets
  JWT_SECRET: "your-super-secret-jwt-key-min-32-chars"
  INSTANCE_JWT_SECRET: "your-instance-jwt-secret-min-32-chars"
  
  # Stripe keys
  STRIPE_SECRET_KEY: "sk_test_your_stripe_secret_key"
  STRIPE_PUBLISHABLE_KEY: "pk_test_your_stripe_publishable_key"
  STRIPE_WEBHOOK_SECRET: "whsec_your_webhook_secret"
  
  # AWS credentials
  AWS_ACCESS_KEY_ID: "your-aws-access-key-id"
  AWS_SECRET_ACCESS_KEY: "your-aws-secret-access-key"
  
  # Admin credentials
  ADMIN_EMAIL: "admin@videostreamgo.com"
  ADMIN_PASSWORD: "your-admin-password"
---
apiVersion: v1
kind: Secret
metadata:
  name: tls-secrets
  namespace: videostreamgo
type: kubernetes.io/tls
stringData:
  # For cert-manager to populate with actual certificates
  # This is a placeholder - cert-manager will replace this
