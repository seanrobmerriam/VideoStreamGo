apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: platform-ingress
  namespace: videostreamgo
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: "500M"
    nginx.ingress.kubernetes.io/proxy-connect-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-buffering: "off"
    nginx.ingress.kubernetes.io/websocket-services: "platform-api"
    nginx.ingress.kubernetes.io/affinity: "cookie"
    nginx.ingress.kubernetes.io/session-cookie-name: "videostreamgo-session"
    nginx.ingress.kubernetes.io/session-cookie-expires: "172800"
    nginx.ingress.kubernetes.io/use-regex: "true"
    nginx.ingress.kubernetes.io/enable-owasp-modsecurity-crs: "true"
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - api.videostreamgo.com
        - "*.videostreamgo.com"
      secretName: platform-tls
  rules:
    # Platform API - admin and main platform routes
    - host: api.videostreamgo.com
      http:
        paths:
          - path: /v1
            pathType: Prefix
            backend:
              service:
                name: platform-api
                port:
                  number: 8080
          - path: /admin
            pathType: Prefix
            backend:
              service:
                name: platform-api
                port:
                  number: 8080
          - path: /health
            pathType: Exact
            backend:
              service:
                name: platform-api
                port:
                  number: 8080
          - path: /ready
            pathType: Exact
            backend:
              service:
                name: platform-api
                port:
                  number: 8080
          - path: /metrics
            pathType: Exact
            backend:
              service:
                name: platform-api
                port:
                  number: 8080
    # Instance API - tenant subdomains (wildcard)
    - host: "*.videostreamgo.com"
      http:
        paths:
          - path: /i
            pathType: Prefix
            backend:
              service:
                name: instance-api
                port:
                  number: 8081
          - path: /assets
            pathType: Prefix
            backend:
              service:
                name: instance-api
                port:
                  number: 8081
          - path: /watch
            pathType: Prefix
            backend:
              service:
                name: instance-api
                port:
                  number: 8081
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: instance-api
                port:
                  number: 8081
          - path: /health
            pathType: Exact
            backend:
              service:
                name: instance-api
                port:
                  number: 8081
---
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-prod
  namespace: videostreamgo
spec:
  acme:
    server: https://acme-v02.api.letsencrypt.org/directory
    email: admin@videostreamgo.com
    privateKeySecretRef:
      name: letsencrypt-prod-account-key
    solvers:
      - http01:
          ingress:
            class: nginx
---
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-staging
  namespace: videostreamgo
spec:
  acme:
    server: https://acme-staging-v02.api.letsencrypt.org/directory
    email: admin@videostreamgo.com
    privateKeySecretRef:
      name: letsencrypt-staging-account-key
    solvers:
      - http01:
          ingress:
            class: nginx
