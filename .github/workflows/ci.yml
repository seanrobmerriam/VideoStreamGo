name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'

      - name: Run Go fmt
        run: |
          if [ -n "$(gofmt -l .)" ]; then
            echo "Go files are not properly formatted"
            gofmt -l .
            exit 1
          fi

      - name: Run Go vet
        run: go vet ./...

      - name: Check for unused imports
        run: |
          go install golang.org/x/tools/cmd/goimports@latest
          if [ -n "$(goimports -l . | grep -v '_test.go')" ]; then
            echo "Unused imports found"
            goimports -l .
            exit 1
          fi

  test:
    name: Test
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'
          cache: true

      - name: Cache Go modules
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/go-build
            ~/go/pkg/mod
          key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-

      - name: Run tests
        run: go test ./... -race -coverprofile coverage.out -covermode=atomic

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: ./coverage.out
          flags: unittests
          fail_ci_if_error: false

      - name: Generate test report
        if: always()
        run: |
          echo "## Test Summary" >> $GITHUB_STEP_SUMMARY
          echo "### Coverage: $(go tool cover -func coverage.out | grep total | awk '{print $3}')" >> $GITHUB_STEP_SUMMARY

  build-platform-api:
    name: Build Platform API
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push' || github.event_name == 'pull_request'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract metadata for Platform API
        id: meta-platform-api
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/platform-api
          tags: |
            type=sha
            type=ref,event=branch
            type=raw,value=latest,enable={{ is_default_branch }}
          flavor: |
            latest=false

      - name: Build and push Platform API
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.platform-api
          push: ${{ github.event_name == 'push' }}
          tags: ${{ steps.meta-platform-api.outputs.tags }}
          labels: ${{ steps.meta-platform-api.outputs.labels }}
          cache-from: type=gha,scope=platform-api
          cache-to: type=gha,mode=max,scope=platform-api
          build-args: |
            GO_VERSION=1.21

  build-instance-api:
    name: Build Instance API
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push' || github.event_name == 'pull_request'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract metadata for Instance API
        id: meta-instance-api
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/instance-api
          tags: |
            type=sha
            type=ref,event=branch
            type=raw,value=latest,enable={{ is_default_branch }}
          flavor: |
            latest=false

      - name: Build and push Instance API
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.instance-api
          push: ${{ github.event_name == 'push' }}
          tags: ${{ steps.meta-instance-api.outputs.tags }}
          labels: ${{ steps.meta-instance-api.outputs.labels }}
          cache-from: type=gha,scope=instance-api
          cache-to: type=gha,mode=max,scope=instance-api
          build-args: |
            GO_VERSION=1.21

  build-frontend:
    name: Build Frontend
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push' || github.event_name == 'pull_request'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: ./frontend

      - name: Lint Frontend
        run: npm run lint
        working-directory: ./frontend

      - name: Build Frontend
        run: npm run build
        working-directory: ./frontend

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract metadata for Frontend
        id: meta-frontend
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/frontend
          tags: |
            type=sha
            type=ref,event=branch
            type=raw,value=latest,enable={{ is_default_branch }}
          flavor: |
            latest=false

      - name: Build and push Frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          file: Dockerfile.frontend
          push: ${{ github.event_name == 'push' }}
          tags: ${{ steps.meta-frontend.outputs.tags }}
          labels: ${{ steps.meta-frontend.outputs.labels }}
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,mode=max,scope=frontend

  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: [build-platform-api, build-instance-api, build-frontend]
    if: github.event_name == 'push'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          severity: 'CRITICAL,HIGH'
          format: 'sarif'
          output: 'trivy-results.sarif'

      - name: Upload Trivy scan results
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: 'trivy-results.sarif'
