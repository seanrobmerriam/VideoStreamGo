name: Tests

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  unit-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'
          cache: true

      - name: Install dependencies
        run: go mod download

      - name: Run unit tests
        run: go test ./internal/... -v -coverprofile=coverage.out

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: coverage.out
          flags: unittests
          fail_ci_if_error: false

  integration-tests:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: videostreamgo
          POSTGRES_PASSWORD: securepassword
          POSTGRES_DB: videostreamgo_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'
          cache: true

      - name: Run database migrations
        run: |
          export PGPASSWORD=securepassword
          psql -h localhost -U videostreamgo -d videostreamgo_test -f internal/database/migrations/master.sql || true

      - name: Run integration tests
        run: go test ./tests/... -v -tags=integration
        env:
          DATABASE_URL: postgres://videostreamgo:securepassword@localhost:5432/videostreamgo_test?sslmode=disable

  load-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up k6
        uses: grafana/setup-k6-action@v2

      - name: Run load tests
        run: k6 run tests/load/
        env:
          BASE_URL: http://localhost:8080

      - name: Upload load test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: load-test-results
          path: tests/load/*_summary.json

  frontend-tests:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run linter
        run: npm run lint

      - name: Run type check
        run: npm run type-check

      - name: Run unit tests
        run: npm run test

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          directory: frontend/coverage
          fail_ci_if_error: false

  security-scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Go security check
        uses: securego/gosec@v2
        with:
          args: ./... -exclude=G304,G107

      - name: Run npm audit
        working-directory: frontend
        run: npm audit --production --audit-level=high

  all-tests-pass:
    needs: [unit-tests, integration-tests, load-tests, frontend-tests, security-scan]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Check if all tests passed
        if: contains(join(needs.*.result, ','), 'failure')
        run: exit 1
      - name: All tests passed
        run: echo "All tests passed!"
